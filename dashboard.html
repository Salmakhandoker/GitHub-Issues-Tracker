<div class="tabs">

<button onclick="loadIssues('all')" id="allBtn" class="tab-btn active">All</button>

<div class="card-header">

    <div class="icon">⚙️</div>

    <div>
      <h3>50 Issues</h3>
      <p>Track and manage your project issues</p>
    </div>
  </div>

  <div class="right">
    <span class="open"></span> Open
    <span class="closed"></span> Closed
  </div>

</div>

<!-- Loader -->

<div id="loader">Loading...</div>

<!-- Issues container -->

<div id="issuesContainer" class="grid"></div>
